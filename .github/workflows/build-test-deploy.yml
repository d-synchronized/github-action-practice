name: Build / Test / Deploy
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout souce code
        uses: actions/checkout@v6
      - name: use node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
      - run: npm install
      - run: npm run build
